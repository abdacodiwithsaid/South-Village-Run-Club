<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>South Village Run Club - Home Page</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/app.js" defer></script>
  </head>
  <body>
    <!-- The Header -->
    <header class="fixed-header">
      <nav class="navbar">
        <a class="logo" href="#"
          ><img src="media/img/logo.svg" alt="Website logo"
        /></a>

        <ul class="navbar-links">
          <li><a href="#home">Home</a></li>
          <li><a href="#about">About Us</a></li>
          <li><a href="#events">Events</a></li>
          <li><a href="#results">Results</a></li>
          <li><a href="#partnering">Partnering Restaurants</a></li>
        </ul>

        <div class="hamburger">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </div>
      </nav>
    </header>

    <!-- Hero Section -->
    <div class="hero">
      <!-- The video -->
      <video class="background-video" autoplay loop muted>
        <source src="media/video/runningClub.mp4" type="video/mp4" />
      </video>

      <div class="overlay-slogan">
        <h1>Build your tomorrow</h1>
        <p>
          At our village we do everything we can to help you become your best
          self, for the rest of your life.
        </p>
        <a href="#join-us" class="cta">Join Us</a>
      </div>
    </div>
  </body>
</html>
